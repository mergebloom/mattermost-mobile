---
name: Fork Build Artifacts

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to build
        required: false
        default: main
        type: string

permissions:
  contents: read

env:
  CI: "true"
  TERM: xterm

jobs:
  android-apk:
    name: Android installable APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Check out requested ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}

      # sign=false avoids Mattermost's private signing repository and secrets.
      - name: Prepare Android build
        uses: ./.github/actions/prepare-android-build
        with:
          sign: "false"

      - name: Build release APKs with the Android debug key
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        working-directory: ./android

      - name: Collect APKs and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/android
          find android/app/build/outputs/apk/release -type f -name '*.apk' -exec cp {} artifacts/android/ \;
          test -n "$(find artifacts/android -maxdepth 1 -type f -name '*.apk' -print -quit)"
          cd artifacts/android
          sha256sum ./*.apk > SHA256SUMS.txt

      - name: Upload installable Android APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mattermost-android-debug-signed-${{ github.run_id }}
          path: artifacts/android/
          if-no-files-found: error
          retention-days: 14
